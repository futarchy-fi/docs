[build]
  command = "python3 -m pip install -r requirements.txt && python3 -m mkdocs build --strict"
  publish = "site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/using-futarchy-in-practice/"
  to = "/use-cases/"
  status = 301
